<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" fill="#0A0A0A"/>

  <!-- YR monogram in gold -->
  <!-- Y: two diagonal arms coming down, meeting at center, then stem going down -->
  <!-- Left arm of Y: top-left to center -->
  <polygon points="10,14 22,14 42,44 42,54 30,54" fill="#C9A84C"/>
  <!-- Right arm of Y: top-right to center -->
  <polygon points="53,14 65,14 45,44 45,54 33,54" fill="#C9A84C"/>
  <!-- Stem of Y: center down -->
  <rect x="30" y="52" width="12" height="34" fill="#C9A84C"/>

  <!-- R: vertical bar, top bump, and diagonal leg -->
  <!-- Vertical bar -->
  <rect x="60" y="14" width="10" height="72" fill="#C9A84C"/>
  <!-- Top arch of R (bowl) -->
  <rect x="60" y="14" width="22" height="10" fill="#C9A84C"/>
  <rect x="60" y="34" width="22" height="10" fill="#C9A84C"/>
  <rect x="80" y="14" width="10" height="30" fill="#C9A84C"/>
  <!-- Leg of R -->
  <polygon points="70,44 82,44 95,86 83,86" fill="#C9A84C"/>
</svg>